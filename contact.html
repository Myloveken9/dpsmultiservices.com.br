<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contato - DPS Multiservices</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .language-section {
      display: none;
    }
    .form-message {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <div class="logo">
        <img src="assets/logo.jpeg" alt="DPS Multiservices" />
      </div>
      <div class="welcome">
        <h1 id="main-title">Contate-Nos</h1>
      </div>
    </div>
    <nav>
      <label for="languageSelect">🌐 Idioma:</label>
      <select id="languageSelect">
        <option value="pt">Português 🇧🇷</option>
        <option value="en">English 🇺🇸</option>
        <option value="fr">Français 🇫🇷</option>
        <option value="es">Español 🇪🇸</option>
      </select>
    </nav>
  </header>

  <nav class="main-nav">
    <h2>
      <a href="index.html">Início</a> | 
      <a href="services.html">Serviços</a>
    </h2>
  </nav>

  <main>
    <!-- Português -->
    <section id="contact-pt" class="language-section">
      <h2>Formulário de Contato</h2>
      <form action="https://formspree.io/f/xwpoljog" method="POST">
        <label for="name-pt">Nome:</label><br>
        <input type="text" id="name-pt" name="name" required><br><br>

        <label for="email-pt">Email:</label><br>
        <input type="email" id="email-pt" name="email" required><br><br>

        <label for="message-pt">Mensagem:</label><br>
        <textarea id="message-pt" name="message" rows="4" required></textarea><br><br>

        <input type="submit" value="Enviar">
      </form>
      <div class="form-message"></div>
    </section>

    <!-- Francês -->
    <section id="contact-fr" class="language-section">
      <h2>Formulaire de Contact</h2>
      <form action="https://formspree.io/f/xwpoljog" method="POST">
        <label for="name-fr">Nom :</label><br>
        <input type="text" id="name-fr" name="name" required><br><br>

        <label for="email-fr">Email :</label><br>
        <input type="email" id="email-fr" name="email" required><br><br>

        <label for="message-fr">Message :</label><br>
        <textarea id="message-fr" name="message" rows="4" required></textarea><br><br>

        <input type="submit" value="Envoyer">
      </form>
      <div class="form-message"></div>
    </section>

    <!-- Inglês -->
    <section id="contact-en" class="language-section">
      <h2>Contact Form</h2>
      <form action="https://formspree.io/f/xwpoljog" method="POST">
        <label for="name-en">Name:</label><br>
        <input type="text" id="name-en" name="name" required><br><br>

        <label for="email-en">Email:</label><br>
        <input type="email" id="email-en" name="email" required><br><br>

        <label for="message-en">Message:</label><br>
        <textarea id="message-en" name="message" rows="4" required></textarea><br><br>

        <input type="submit" value="Send">
      </form>
      <div class="form-message"></div>
    </section>

    <!-- Espanhol -->
    <section id="contact-es" class="language-section">
      <h2>Formulario de Contacto</h2>
      <form action="https://formspree.io/f/xwpoljog" method="POST">
        <label for="name-es">Nombre:</label><br>
        <input type="text" id="name-es" name="name" required><br><br>

        <label for="email-es">Correo electrónico:</label><br>
        <input type="email" id="email-es" name="email" required><br><br>

        <label for="message-es">Mensaje:</label><br>
        <textarea id="message-es" name="message" rows="4" required></textarea><br><br>

        <input type="submit" value="Enviar">
      </form>
      <div class="form-message"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 DPS Multiservices. Todos os direitos reservados.</p>
  </footer>

  <script>
    const languageSelect = document.getElementById('languageSelect');
    const mainTitle = document.getElementById('main-title');

    const titles = {
      pt: 'Contate-Nos',
      en: 'Contact Us',
      fr: 'Contactez-Nous',
      es: 'Contáctenos'
    };

    function showLanguage(language) {
      document.querySelectorAll('.language-section').forEach(section => {
        section.style.display = 'none';
      });

      const activeSection = document.getElementById('contact-' + language);
      if (activeSection) {
        activeSection.style.display = 'block';
      }

      mainTitle.textContent = titles[language] || 'Contato';
    }

    const userLang = navigator.language.slice(0, 2);
    const defaultLang = ['pt', 'en', 'fr', 'es'].includes(userLang) ? userLang : 'pt';

    languageSelect.value = defaultLang;
    showLanguage(defaultLang);

    languageSelect.addEventListener('change', (e) => {
      showLanguage(e.target.value);
    });

    // Intercepter les envois et afficher un message dynamique
    const forms = document.querySelectorAll("form");

    forms.forEach(form => {
      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const formData = new FormData(form);
        const messageBox = form.nextElementSibling;

        try {
          const response = await fetch(form.action, {
            method: "POST",
            body: formData,
            headers: { 'Accept': 'application/json' }
          });

          if (response.ok) {
            messageBox.textContent = "✅ Merci ! Votre message a bien été envoyé.";
            messageBox.style.color = "green";
            form.reset();
          } else {
            messageBox.textContent = "❌ Une erreur est survenue. Veuillez réessayer.";
            messageBox.style.color = "red";
          }
        } catch (error) {
          messageBox.textContent = "⚠️ Erreur réseau. Vérifiez votre connexion.";
          messageBox.style.color = "orange";
        }
      });
    });
  </script>
</body>
</html>
